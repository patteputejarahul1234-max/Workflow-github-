name: Compile Profile Assets

on:
  schedule:
    - cron: "0 0 * * *" # Runs automatically every night at midnight
  workflow_dispatch: # Allows manual override triggers

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Codebase Base
        uses: actions/checkout@v4

      - name: Initialize Assets Directory Layer
        run: mkdir -p assets

    
      - name: Generate Codebase Contribution Flow Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: patteputejarahul1234-max
          outputs: |
            assets/github-contribution-grid-snake.svg?palette=github-dark

      - name: Download System Metrics SVG
        run: |
          curl -o assets/github-metrics.svg "https://github-readme-stats.vercel.app/api?username=patteputejarahul1234-max&show_icons=true&theme=tokyonight&count_private=true&hide_border=true&bg_color=0D1117&title_color=58A6FF&icon_color=7EE787"

      - name: Download Language Matrix SVG
        run: |
          curl -o assets/language-metrics.svg "https://github-readme-stats.vercel.app/api/top-langs/?username=patteputejarahul1234-max&layout=compact&theme=tokyonight&hide_border=true&bg_color=0D1117&title_color=58A6FF"

      - name: Sync Asset Snapshots to Codebase
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/*.svg
          git diff --staged --quiet || git commit -m "chore: automated asset compilation [skip ci]"
          git push
